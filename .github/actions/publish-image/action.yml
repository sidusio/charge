name: Build and Publish Image
description: Build and Publish Container image
inputs:
  github-token:
    required: true
    description: Github Token

runs:
  using: composite
  steps:
    - name: Generate Image Tags
      id: tags
      shell: bash
      run: |
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          TAGS="pr-${{ github.event.pull_request.number }} ${{ github.event.pull_request.head.sha }}"
        elif [ "${{ github.event_name }}" == "push" ] || [ "${{ github.ref_name }}" == "main" ]; then
          TAGS="latest ${{ github.sha }}"
        fi
        echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

    - name: Build Binaries
      shell: bash
      env:
        CGO_ENABLED: 0
        GOEXPERIMENT: jsonv2
      run: |
        GOARCH=amd64 go build -o charge-amd64 ./cmd/charge
        GOARCH=arm64 go build -o charge-arm64 ./cmd/charge

    - uses: redhat-actions/podman-login@v1
      with:
        registry: ${{ env.REGISTRY }}
        username: github_workflow
        password: ${{ inputs.github-token }}

    - name: Build and Push Multi-arch Manifest
      shell: bash
      run: |
        IMAGE="${{ env.REGISTRY }}/${{ github.repository }}"

        buildah build --arch amd64 --os linux --build-arg BINARY=charge-amd64 -f Containerfile -t "${IMAGE}:amd64-build" .
        buildah build --arch arm64 --os linux --build-arg BINARY=charge-arm64 -f Containerfile -t "${IMAGE}:arm64-build" .

        for TAG in ${{ steps.tags.outputs.tags }}; do
          buildah manifest create "${IMAGE}:${TAG}"
          buildah manifest add "${IMAGE}:${TAG}" "${IMAGE}:amd64-build"
          buildah manifest add "${IMAGE}:${TAG}" "${IMAGE}:arm64-build"
          buildah manifest push --all "${IMAGE}:${TAG}" "docker://${IMAGE}:${TAG}"
        done
